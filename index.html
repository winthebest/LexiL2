<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#f7f2e8" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#18130f" media="(prefers-color-scheme: dark)" />
    <meta name="description" content="GRE vocabulary companion for Vietnamese learners." />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="GRE L2" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>GRE Vocabulary</title>

    <!-- Đặt theme TRƯỚC khi vẽ để không nháy sáng/tối (no-flash). -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('gre-l2:theme:v3')
          if (t !== 'light') t = 'dark'
          document.documentElement.setAttribute('data-theme', t)
        } catch (e) {}
      })()
    </script>

    <!--
      Tách vai font:
        Noto Serif       → tiêu đề / từ vựng chính (.font-display), phủ tiếng Việt tốt
        Be Vietnam Pro   → nội dung dài + UI (mặc định), tối ưu tiếng Việt
        Gentium Plus     → chuỗi IPA (.ipa)
        IBM Plex Mono    → số liệu / morpheme / phím tắt (.font-data)
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,500;0,600;0,700;1,500&family=Be+Vietnam+Pro:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Gentium+Plus:ital@0;1&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
